<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <title>SOLO - Back To The Future Sneakers</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: #000;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      color: #fff;
      overflow: hidden;
      width: 100%;
      height: 100%;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .stage {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      height: 100svh;
      height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      cursor: pointer;
      z-index: 1;
    }
    .presentation-container {
      position: absolute;
      width: 1920px;
      height: 1080px;
      transform-origin: center center;
      background: #000;
      will-change: transform;
      pointer-events: none;
    }
    .slide-frame {
      position: absolute;
      top: 0;
      left: 0;
      width: 1920px;
      height: 1080px;
      border: none;
      opacity: 0;
      transition: opacity 0.6s ease;
      pointer-events: none;
    }
    .slide-frame.active {
      opacity: 1;
    }
    .progress-bar {
      position: fixed;
      top: 0;
      left: 0;
      height: 3px;
      background: linear-gradient(90deg, #39FF14, #00FF6A);
      transition: width 0.4s ease;
      z-index: 100;
      box-shadow: 0 0 10px rgba(57, 255, 20, 0.5);
    }
    .keyboard-hint {
      position: fixed;
      top: 20px;
      right: 20px;
      color: rgba(255,255,255,0.4);
      font-size: 12px;
      letter-spacing: 1px;
      z-index: 100;
      pointer-events: none;
    }
    .fullscreen-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(57, 255, 20, 0.3);
      color: #39FF14;
      padding: 8px 16px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 12px;
      letter-spacing: 1px;
      z-index: 200;
      transition: all 0.3s;
      -webkit-tap-highlight-color: transparent;
    }
    .fullscreen-btn:hover {
      background: rgba(57, 255, 20, 0.2);
      border-color: #39FF14;
    }
    .pdf-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(255, 20, 147, 0.4);
      color: #FF1493;
      padding: 8px 16px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 12px;
      letter-spacing: 1px;
      z-index: 200;
      transition: all 0.3s;
      -webkit-tap-highlight-color: transparent;
      font-weight: 700;
    }
    .pdf-btn:hover {
      background: rgba(255, 20, 147, 0.2);
      border-color: #FF1493;
    }
    .pdf-btn:disabled {
      opacity: 0.5;
      cursor: wait;
    }
    .pdf-progress {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.9);
      border: 1px solid rgba(57, 255, 20, 0.4);
      color: #39FF14;
      padding: 20px 32px;
      border-radius: 16px;
      font-size: 15px;
      z-index: 9999;
      text-align: center;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      min-width: 240px;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      box-shadow: 0 0 40px rgba(57,255,20,0.2);
    }
    .pdf-progress .spinner {
      display: inline-block;
      width: 24px;
      height: 24px;
      border: 3px solid rgba(57,255,20,0.2);
      border-top-color: #39FF14;
      border-radius: 50%;
      animation: pdfspin 0.8s linear infinite;
      margin-bottom: 12px;
    }
    @keyframes pdfspin { to { transform: rotate(360deg); } }
    .pdf-progress .pbar {
      width: 100%;
      height: 4px;
      background: rgba(57,255,20,0.15);
      border-radius: 2px;
      margin-top: 12px;
      overflow: hidden;
    }
    .pdf-progress .pbar-fill {
      height: 100%;
      background: linear-gradient(90deg, #39FF14, #00FF6A);
      border-radius: 2px;
      transition: width 0.3s;
    }
    /* Tap hint zones (subtle visual feedback only on hover, invisible on mobile) */
    .tap-zone {
      position: fixed;
      top: 0;
      width: 1px;
      height: 100%;
      z-index: 50;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
    }
    @media (hover: hover) {
      .stage:hover .tap-zone {
        opacity: 1;
      }
      .tap-zone::after {
        content: '';
        position: absolute;
        top: 50%;
        width: 40px;
        height: 40px;
        border: 2px solid rgba(57, 255, 20, 0.3);
        border-radius: 50%;
        transform: translateY(-50%);
      }
      .tap-zone.prev::after { left: 20px; border-right: none; border-top-right-radius: 0; border-bottom-right-radius: 0; width: 25px; }
      .tap-zone.next::after { right: 20px; border-left: none; border-top-left-radius: 0; border-bottom-left-radius: 0; width: 25px; left: auto; }
    }
    @media (max-width: 768px) {
      .keyboard-hint {
        display: none;
      }
      .fullscreen-btn {
        top: max(14px, env(safe-area-inset-top));
        left: 14px;
        padding: 7px 12px;
        font-size: 11px;
      }
      .pdf-btn {
        top: max(14px, env(safe-area-inset-top));
        right: 14px;
        padding: 7px 12px;
        font-size: 11px;
      }
    }
  </style>
</head>
<body>
  <div class="progress-bar" id="progressBar"></div>
  <div class="keyboard-hint">← → ARROWS TO NAVIGATE  ·  TAP LEFT/RIGHT</div>
  <button class="fullscreen-btn" id="fsBtn" type="button">⛶ FULLSCREEN</button>
  <button class="pdf-btn" id="pdfBtn" type="button">📄 PDF</button>

  <div class="stage" id="stage">
    <div class="presentation-container" id="container">
      <!-- Slides will be loaded here -->
    </div>
  </div>

  <script>
    const slides = [
      'pages/cover.html',
      'pages/about.html',
      'pages/founders.html',
      'pages/problems.html',
      'pages/solutions.html',
      'pages/product.html',
      'pages/materials.html',
      'pages/consumer.html',
      'pages/marketing.html',
      'pages/usp.html',
      'pages/creator.html',
      'pages/sustainable.html',
      'pages/investment.html',
      'pages/growth.html',
      'pages/logo.html',
      'pages/thankyou.html'
    ];

    const SLIDE_W = 1920;
    const SLIDE_H = 1080;

    let currentSlide = 0;
    const container = document.getElementById('container');
    const stage = document.getElementById('stage');
    const progressBar = document.getElementById('progressBar');

    // Mobile Safari can crash if every animated slide is loaded in its own
    // iframe at startup. Keep only the active slide mounted.
    const slideFrame = document.createElement('iframe');
    slideFrame.className = 'slide-frame';
    slideFrame.setAttribute('scrolling', 'no');
    slideFrame.style.width = SLIDE_W + 'px';
    slideFrame.style.height = SLIDE_H + 'px';
    container.appendChild(slideFrame);

    // Auto-scale to fit window
    function scaleToFit() {
      const scaleX = window.innerWidth / SLIDE_W;
      const scaleY = window.innerHeight / SLIDE_H;
      const scale = Math.min(scaleX, scaleY);
      container.style.transform = 'scale(' + scale + ')';
    }

    window.addEventListener('resize', scaleToFit);
    window.addEventListener('orientationchange', scaleToFit);
    scaleToFit();

    let activeSrc = '';

    function showSlide(index) {
      if (index < 0) index = 0;
      if (index >= slides.length) index = slides.length - 1;
      currentSlide = index;

      const nextSrc = slides[index];
      slideFrame.classList.remove('active');
      if (activeSrc !== nextSrc) {
        activeSrc = nextSrc;
        slideFrame.onload = () => {
          if (activeSrc === nextSrc) {
            slideFrame.classList.add('active');
          }
        };
        slideFrame.src = nextSrc;
      } else {
        slideFrame.classList.add('active');
      }

      progressBar.style.width = ((index + 1) / slides.length * 100) + '%';
    }

    function nextSlide() {
      if (currentSlide < slides.length - 1) {
        showSlide(currentSlide + 1);
      }
    }

    function prevSlide() {
      if (currentSlide > 0) {
        showSlide(currentSlide - 1);
      }
    }

    function isIOS() {
      return /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
    }
    function isStandalone() {
      return window.navigator.standalone === true || window.matchMedia('(display-mode: standalone)').matches;
    }
    function isFullscreen() {
      return !!(document.fullscreenElement || document.webkitFullscreenElement || document.webkitCurrentFullScreenElement);
    }
    function requestFullscreenEl(el) {
      if (el.requestFullscreen) return el.requestFullscreen();
      if (el.webkitRequestFullscreen) return el.webkitRequestFullscreen();
      if (el.webkitEnterFullscreen) return el.webkitEnterFullscreen(); // iOS video only
      return Promise.reject(new Error('fullscreen not supported'));
    }
    function exitFullscreen() {
      if (document.exitFullscreen) return document.exitFullscreen();
      if (document.webkitExitFullscreen) return document.webkitExitFullscreen();
      if (document.webkitCancelFullScreen) return document.webkitCancelFullScreen();
      return Promise.reject(new Error('exit fullscreen not supported'));
    }
    function toggleFullscreen() {
      if (isFullscreen()) {
        exitFullscreen().catch(() => {});
        return;
      }
      // Try standard/webkit fullscreen on documentElement (works on iPad, desktop, Android)
      requestFullscreenEl(document.documentElement).then(() => {
        // Rescale after entering fullscreen
        setTimeout(scaleToFit, 100);
      }).catch(() => {
        // Fallback for iPhone Safari where fullscreen API is unavailable:
        // 1) Scroll slightly to hide Safari's bottom toolbar
        // 2) Show a brief toast suggesting "Add to Home Screen"
        try {
          // Temporarily allow scroll
          document.body.style.overflow = '';
          document.documentElement.style.overflow = '';
          window.scrollTo(0, 1);
          setTimeout(() => {
            document.body.style.overflow = 'hidden';
            document.documentElement.style.overflow = 'hidden';
            scaleToFit();
          }, 300);
        } catch(e) {}
        showToast(isIOS() && !isStandalone()
          ? '提示：在Safari中点击底部分享按钮 → "添加到主屏幕"，可获得无浏览器栏的真正全屏体验'
          : '已尝试全屏显示');
      });
    }

    // Toast for fullscreen hints
    function showToast(msg) {
      let t = document.getElementById('fsToast');
      if (!t) {
        t = document.createElement('div');
        t.id = 'fsToast';
        t.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.85);color:#39FF14;padding:12px 20px;border-radius:12px;font-size:13px;z-index:9999;max-width:85%;text-align:center;line-height:1.5;border:1px solid rgba(57,255,20,0.4);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);opacity:0;transition:opacity 0.3s;pointer-events:none;font-family:Helvetica Neue,Arial,sans-serif;';
        document.body.appendChild(t);
      }
      t.textContent = msg;
      t.style.opacity = '1';
      clearTimeout(t._timer);
      t._timer = setTimeout(() => { t.style.opacity = '0'; }, 3500);
    }

    // Fullscreen button
    document.getElementById('fsBtn').addEventListener('click', (e) => {
      e.stopPropagation();
      toggleFullscreen();
    });

    // ============================================
    // PDF DOWNLOAD
    // ============================================
    function loadScript(src) {
      return new Promise((resolve, reject) => {
        if (document.querySelector(`script[data-src="${src}"]`)) { resolve(); return; }
        const s = document.createElement('script');
        s.src = src;
        s.setAttribute('data-src', src);
        s.onload = resolve;
        s.onerror = reject;
        document.head.appendChild(s);
      });
    }

    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    function waitForFrameLoad(frame, timeoutMs = 15000) {
      return new Promise((resolve) => {
        let done = false;
        const to = setTimeout(() => { if (!done) { done = true; resolve(); } }, timeoutMs);
        frame.onload = () => { clearTimeout(to); if (!done) { done = true; resolve(); } };
      });
    }

    function waitForImages(win, timeoutMs = 8000) {
      return new Promise((resolve) => {
        const start = Date.now();
        function check() {
          const imgs = win.document.querySelectorAll('img');
          let allLoaded = true;
          imgs.forEach(img => { if (!img.complete) allLoaded = false; });
          if (allLoaded || Date.now() - start > timeoutMs) resolve();
          else setTimeout(check, 150);
        }
        check();
      });
    }

    function injectAnimationFreeze(win) {
      const doc = win.document;
      let style = doc.getElementById('__pdfFreeze__');
      if (style) return;
      style = doc.createElement('style');
      style.id = '__pdfFreeze__';
      style.textContent = `
        *, *::before, *::after {
          animation-duration: 0s !important;
          animation-delay: 0s !important;
          animation-iteration-count: 1 !important;
          animation-fill-mode: forwards !important;
          animation-play-state: paused !important;
          transition-duration: 0s !important;
          transition-delay: 0s !important;
        }
        html, body { overflow: hidden !important; }
      `;
      doc.head.appendChild(style);
      // Force all animations to final state
      try {
        const els = doc.querySelectorAll('*');
        els.forEach(el => {
          try {
            const cs = win.getComputedStyle(el);
            if (cs.animationName && cs.animationName !== 'none') {
              const anims = el.getAnimations ? el.getAnimations() : [];
              anims.forEach(a => { try { a.finish(); } catch(e) {} });
            }
          } catch(e) {}
        });
      } catch(e) {}
    }

    function injectHtml2Canvas(frame) {
      return new Promise((resolve, reject) => {
        const win = frame.contentWindow;
        if (win.html2canvas) { resolve(); return; }
        const s = win.document.createElement('script');
        s.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
        s.onload = resolve;
        s.onerror = reject;
        win.document.head.appendChild(s);
      });
    }

    function showPdfProgress(text, pct) {
      let el = document.getElementById('pdfProgress');
      if (!el) {
        el = document.createElement('div');
        el.id = 'pdfProgress';
        el.className = 'pdf-progress';
        el.innerHTML = '<div class="spinner"></div><div class="pdf-text"></div><div class="pbar"><div class="pbar-fill"></div></div>';
        document.body.appendChild(el);
      }
      el.querySelector('.pdf-text').textContent = text;
      const fill = el.querySelector('.pbar-fill');
      if (pct != null) fill.style.width = pct + '%';
      else fill.style.width = '0%';
      return el;
    }

    function hidePdfProgress() {
      const el = document.getElementById('pdfProgress');
      if (el) el.remove();
    }

    async function generatePDF() {
      const btn = document.getElementById('pdfBtn');
      btn.disabled = true;
      btn.textContent = '⏳ 生成中...';

      try {
        showPdfProgress('正在加载 PDF 组件...', 0);
        await loadScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js');

        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF({ orientation: 'landscape', unit: 'px', format: [1920, 1080], hotfixes: ['px_scaling'] });

        // Create hidden render iframe at exact 1920x1080
        const frame = document.createElement('iframe');
        frame.style.cssText = 'position:fixed;left:-20000px;top:0;width:1920px;height:1080px;border:0;margin:0;padding:0;';
        frame.setAttribute('scrolling', 'no');
        document.body.appendChild(frame);

        for (let i = 0; i < slides.length; i++) {
          showPdfProgress(`正在生成 PDF... (${i+1}/${slides.length})`, Math.round((i / slides.length) * 100));

          frame.src = slides[i];
          await waitForFrameLoad(frame, 15000);
          await sleep(1800); // wait for CSS animations to complete
          await waitForImages(frame.contentWindow, 6000);
          injectAnimationFreeze(frame.contentWindow);
          await sleep(300);

          try {
            await injectHtml2Canvas(frame);
          } catch(e) {
            console.warn('html2canvas inject failed, trying parent instance');
          }

          const h2c = frame.contentWindow.html2canvas || window.html2canvas;
          const body = frame.contentDocument.body;
          const canvas = await h2c(body, {
            width: 1920,
            height: 1080,
            windowWidth: 1920,
            windowHeight: 1080,
            scale: 1,
            useCORS: true,
            allowTaint: true,
            backgroundColor: '#000000',
            logging: false,
            removeContainer: true
          });

          const imgData = canvas.toDataURL('image/jpeg', 0.9);
          if (i > 0) pdf.addPage([1920, 1080], 'landscape');
          pdf.addImage(imgData, 'JPEG', 0, 0, 1920, 1080);
        }

        document.body.removeChild(frame);
        showPdfProgress('正在保存 PDF...', 100);
        await sleep(300);
        pdf.save('SOLO_Back_To_The_Future_Sneakers.pdf');
        hidePdfProgress();
        showToast('PDF 下载已开始！');
      } catch(err) {
        console.error('PDF generation error:', err);
        hidePdfProgress();
        showToast('PDF 生成失败，请重试。错误：' + err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = '📄 PDF';
      }
    }

    document.getElementById('pdfBtn').addEventListener('click', (e) => {
      e.stopPropagation();
      generatePDF();
    });

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'Enter') {
        e.preventDefault();
        nextSlide();
      } else if (e.key === 'ArrowLeft' || e.key === 'Backspace') {
        e.preventDefault();
        prevSlide();
      } else if (e.key === 'Home') {
        showSlide(0);
      } else if (e.key === 'End') {
        showSlide(slides.length - 1);
      } else if (e.key === 'f' || e.key === 'F') {
        toggleFullscreen();
      }
    });

    // Click/tap to advance: right half = next, left half = prev
    // Use a single click handler on the stage, ignore clicks on UI buttons
    let touchStartX = 0;
    let touchStartY = 0;
    let touchMoved = false;
    const SWIPE_THRESHOLD = 50;

    stage.addEventListener('click', (e) => {
      // Don't navigate if user was swiping
      if (touchMoved) { touchMoved = false; return; }
      const x = e.clientX;
      if (x > window.innerWidth / 2) {
        nextSlide();
      } else {
        prevSlide();
      }
    });

    // Touch swipe support for mobile
    stage.addEventListener('touchstart', (e) => {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
      touchMoved = false;
    }, { passive: true });

    stage.addEventListener('touchmove', (e) => {
      const dx = Math.abs(e.touches[0].clientX - touchStartX);
      const dy = Math.abs(e.touches[0].clientY - touchStartY);
      if (dx > 10 || dy > 10) touchMoved = true;
    }, { passive: true });

    stage.addEventListener('touchend', (e) => {
      if (!touchMoved) return;
      const dx = e.changedTouches[0].clientX - touchStartX;
      const dy = Math.abs(e.changedTouches[0].clientY - touchStartY);
      // Only trigger if horizontal swipe is dominant and exceeds threshold
      if (Math.abs(dx) > SWIPE_THRESHOLD && Math.abs(dx) > dy) {
        if (dx < 0) {
          nextSlide();
        } else {
          prevSlide();
        }
      }
      touchMoved = false;
    }, { passive: true });

    // Initialize first slide
    showSlide(0);
  </script>
</body>
</html>
