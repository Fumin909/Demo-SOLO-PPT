<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SOLO - Back To The Future Sneakers</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: #000;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      color: #fff;
      overflow: hidden;
      width: 100%;
      height: 100%;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .stage {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      height: 100svh;
      height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      cursor: pointer;
      z-index: 1;
    }
    .presentation-container {
      position: absolute;
      width: 1920px;
      height: 1080px;
      transform-origin: center center;
      background: #000;
      will-change: transform;
      pointer-events: none;
    }
    .slide-frame {
      position: absolute;
      top: 0;
      left: 0;
      width: 1920px;
      height: 1080px;
      border: none;
      opacity: 0;
      transition: opacity 0.6s ease;
      pointer-events: none;
    }
    .slide-frame.active {
      opacity: 1;
    }
    .progress-bar {
      position: fixed;
      top: 0;
      left: 0;
      height: 3px;
      background: linear-gradient(90deg, #39FF14, #00FF6A);
      transition: width 0.4s ease;
      z-index: 100;
      box-shadow: 0 0 10px rgba(57, 255, 20, 0.5);
    }
    .keyboard-hint {
      position: fixed;
      top: 20px;
      right: 20px;
      color: rgba(255,255,255,0.4);
      font-size: 12px;
      letter-spacing: 1px;
      z-index: 100;
      pointer-events: none;
    }
    .fullscreen-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(57, 255, 20, 0.3);
      color: #39FF14;
      padding: 8px 16px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 12px;
      letter-spacing: 1px;
      z-index: 200;
      transition: all 0.3s;
      -webkit-tap-highlight-color: transparent;
    }
    .fullscreen-btn:hover {
      background: rgba(57, 255, 20, 0.2);
      border-color: #39FF14;
    }
    /* Tap hint zones (subtle visual feedback only on hover, invisible on mobile) */
    .tap-zone {
      position: fixed;
      top: 0;
      width: 1px;
      height: 100%;
      z-index: 50;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
    }
    @media (hover: hover) {
      .stage:hover .tap-zone {
        opacity: 1;
      }
      .tap-zone::after {
        content: '';
        position: absolute;
        top: 50%;
        width: 40px;
        height: 40px;
        border: 2px solid rgba(57, 255, 20, 0.3);
        border-radius: 50%;
        transform: translateY(-50%);
      }
      .tap-zone.prev::after { left: 20px; border-right: none; border-top-right-radius: 0; border-bottom-right-radius: 0; width: 25px; }
      .tap-zone.next::after { right: 20px; border-left: none; border-top-left-radius: 0; border-bottom-left-radius: 0; width: 25px; left: auto; }
    }
    @media (max-width: 768px) {
      .keyboard-hint {
        display: none;
      }
      .fullscreen-btn {
        top: max(14px, env(safe-area-inset-top));
        left: 14px;
        padding: 7px 12px;
        font-size: 11px;
      }
    }
  </style>
</head>
<body>
  <div class="progress-bar" id="progressBar"></div>
  <div class="keyboard-hint">← → ARROWS TO NAVIGATE  ·  TAP LEFT/RIGHT</div>
  <button class="fullscreen-btn" id="fsBtn" type="button">⛶ FULLSCREEN</button>

  <div class="stage" id="stage">
    <div class="presentation-container" id="container">
      <!-- Slides will be loaded here -->
    </div>
  </div>

  <script>
    const slides = [
      'pages/cover.html',
      'pages/about.html',
      'pages/founders.html',
      'pages/problems.html',
      'pages/solutions.html',
      'pages/product.html',
      'pages/materials.html',
      'pages/consumer.html',
      'pages/marketing.html',
      'pages/usp.html',
      'pages/creator.html',
      'pages/sustainable.html',
      'pages/investment.html',
      'pages/growth.html',
      'pages/logo.html',
      'pages/thankyou.html'
    ];

    const SLIDE_W = 1920;
    const SLIDE_H = 1080;

    let currentSlide = 0;
    const container = document.getElementById('container');
    const stage = document.getElementById('stage');
    const progressBar = document.getElementById('progressBar');

    // Mobile Safari can crash if every animated slide is loaded in its own
    // iframe at startup. Keep only the active slide mounted.
    const slideFrame = document.createElement('iframe');
    slideFrame.className = 'slide-frame';
    slideFrame.setAttribute('scrolling', 'no');
    slideFrame.style.width = SLIDE_W + 'px';
    slideFrame.style.height = SLIDE_H + 'px';
    container.appendChild(slideFrame);

    // Auto-scale to fit window
    function scaleToFit() {
      const scaleX = window.innerWidth / SLIDE_W;
      const scaleY = window.innerHeight / SLIDE_H;
      const scale = Math.min(scaleX, scaleY);
      container.style.transform = 'scale(' + scale + ')';
    }

    window.addEventListener('resize', scaleToFit);
    window.addEventListener('orientationchange', scaleToFit);
    scaleToFit();

    let activeSrc = '';

    function showSlide(index) {
      if (index < 0) index = 0;
      if (index >= slides.length) index = slides.length - 1;
      currentSlide = index;

      const nextSrc = slides[index];
      slideFrame.classList.remove('active');
      if (activeSrc !== nextSrc) {
        activeSrc = nextSrc;
        slideFrame.onload = () => {
          if (activeSrc === nextSrc) {
            slideFrame.classList.add('active');
          }
        };
        slideFrame.src = nextSrc;
      } else {
        slideFrame.classList.add('active');
      }

      progressBar.style.width = ((index + 1) / slides.length * 100) + '%';
    }

    function nextSlide() {
      if (currentSlide < slides.length - 1) {
        showSlide(currentSlide + 1);
      }
    }

    function prevSlide() {
      if (currentSlide > 0) {
        showSlide(currentSlide - 1);
      }
    }

    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(() => {});
      } else {
        document.exitFullscreen();
      }
    }

    // Fullscreen button
    document.getElementById('fsBtn').addEventListener('click', (e) => {
      e.stopPropagation();
      toggleFullscreen();
    });

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'Enter') {
        e.preventDefault();
        nextSlide();
      } else if (e.key === 'ArrowLeft' || e.key === 'Backspace') {
        e.preventDefault();
        prevSlide();
      } else if (e.key === 'Home') {
        showSlide(0);
      } else if (e.key === 'End') {
        showSlide(slides.length - 1);
      } else if (e.key === 'f' || e.key === 'F') {
        toggleFullscreen();
      }
    });

    // Click/tap to advance: right half = next, left half = prev
    // Use a single click handler on the stage, ignore clicks on UI buttons
    let touchStartX = 0;
    let touchStartY = 0;
    let touchMoved = false;
    const SWIPE_THRESHOLD = 50;

    stage.addEventListener('click', (e) => {
      // Don't navigate if user was swiping
      if (touchMoved) { touchMoved = false; return; }
      const x = e.clientX;
      if (x > window.innerWidth / 2) {
        nextSlide();
      } else {
        prevSlide();
      }
    });

    // Touch swipe support for mobile
    stage.addEventListener('touchstart', (e) => {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
      touchMoved = false;
    }, { passive: true });

    stage.addEventListener('touchmove', (e) => {
      const dx = Math.abs(e.touches[0].clientX - touchStartX);
      const dy = Math.abs(e.touches[0].clientY - touchStartY);
      if (dx > 10 || dy > 10) touchMoved = true;
    }, { passive: true });

    stage.addEventListener('touchend', (e) => {
      if (!touchMoved) return;
      const dx = e.changedTouches[0].clientX - touchStartX;
      const dy = Math.abs(e.changedTouches[0].clientY - touchStartY);
      // Only trigger if horizontal swipe is dominant and exceeds threshold
      if (Math.abs(dx) > SWIPE_THRESHOLD && Math.abs(dx) > dy) {
        if (dx < 0) {
          nextSlide();
        } else {
          prevSlide();
        }
      }
      touchMoved = false;
    }, { passive: true });

    // Initialize first slide
    showSlide(0);
  </script>
</body>
</html>
