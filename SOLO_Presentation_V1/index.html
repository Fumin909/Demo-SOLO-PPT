<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOLO - Back To The Future Sneakers</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: #000;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      color: #fff;
      overflow: hidden;
      width: 100%;
      height: 100%;
    }
    .stage {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      height: 100svh;
      height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .presentation-container {
      position: absolute;
      width: 1920px;
      height: 1080px;
      transform-origin: center center;
      background: #000;
      will-change: transform;
    }
    .slide-frame {
      position: absolute;
      top: 0;
      left: 0;
      width: 1920px;
      height: 1080px;
      border: none;
      opacity: 0;
      transition: opacity 0.6s ease;
      pointer-events: none;
    }
    .slide-frame.active {
      opacity: 1;
    }
    .nav-controls {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 20px;
      z-index: 100;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding: 12px 24px;
      border-radius: 999px;
      border: 1px solid rgba(57, 255, 20, 0.3);
    }
    .nav-btn {
      background: transparent;
      border: 1px solid rgba(57, 255, 20, 0.5);
      color: #39FF14;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
    }
    .nav-btn:hover {
      background: #39FF14;
      color: #000;
      box-shadow: 0 0 20px rgba(57, 255, 20, 0.5);
    }
    .slide-indicator {
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      min-width: 80px;
      text-align: center;
      letter-spacing: 2px;
    }
    .slide-indicator .current {
      color: #39FF14;
      font-size: 20px;
    }
    .progress-bar {
      position: fixed;
      top: 0;
      left: 0;
      height: 3px;
      background: linear-gradient(90deg, #39FF14, #00FF6A);
      transition: width 0.4s ease;
      z-index: 100;
      box-shadow: 0 0 10px rgba(57, 255, 20, 0.5);
    }
    .keyboard-hint {
      position: fixed;
      top: 20px;
      right: 20px;
      color: rgba(255,255,255,0.4);
      font-size: 12px;
      letter-spacing: 1px;
      z-index: 100;
    }
    .fullscreen-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(57, 255, 20, 0.3);
      color: #39FF14;
      padding: 8px 16px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 12px;
      letter-spacing: 1px;
      z-index: 100;
      transition: all 0.3s;
    }
    .fullscreen-btn:hover {
      background: rgba(57, 255, 20, 0.2);
      border-color: #39FF14;
    }
    @media (max-width: 768px) {
      .keyboard-hint {
        display: none;
      }
      .fullscreen-btn {
        top: max(14px, env(safe-area-inset-top));
        left: 14px;
        padding: 7px 12px;
        font-size: 11px;
      }
      .nav-controls {
        bottom: max(18px, env(safe-area-inset-bottom));
        gap: 14px;
        padding: 10px 18px;
      }
      .nav-btn {
        width: 38px;
        height: 38px;
      }
    }
  </style>
</head>
<body>
  <div class="progress-bar" id="progressBar"></div>
  <div class="keyboard-hint">← → ARROWS TO NAVIGATE</div>
  <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ FULLSCREEN</button>

  <div class="stage" id="stage">
    <div class="presentation-container" id="container">
      <!-- Slides will be loaded here -->
    </div>
  </div>

  <div class="nav-controls">
    <button class="nav-btn" id="prevBtn" onclick="prevSlide()">◀</button>
    <div class="slide-indicator">
      <span class="current" id="currentNum">01</span> / <span id="totalNum">16</span>
    </div>
    <button class="nav-btn" id="nextBtn" onclick="nextSlide()">▶</button>
  </div>

  <script>
    const slides = [
      'pages/cover.html',
      'pages/about.html',
      'pages/founders.html',
      'pages/problems.html',
      'pages/solutions.html',
      'pages/product.html',
      'pages/materials.html',
      'pages/consumer.html',
      'pages/marketing.html',
      'pages/usp.html',
      'pages/creator.html',
      'pages/sustainable.html',
      'pages/investment.html',
      'pages/growth.html',
      'pages/logo.html',
      'pages/thankyou.html'
    ];

    const SLIDE_W = 1920;
    const SLIDE_H = 1080;

    let currentSlide = 0;
    const container = document.getElementById('container');
    const stage = document.getElementById('stage');
    const currentNum = document.getElementById('currentNum');
    const totalNum = document.getElementById('totalNum');
    const progressBar = document.getElementById('progressBar');

    // Mobile Safari can crash if every animated slide is loaded in its own
    // iframe at startup. Keep only the active slide mounted.
    const slideFrame = document.createElement('iframe');
    slideFrame.className = 'slide-frame';
    slideFrame.setAttribute('scrolling', 'no');
    slideFrame.style.width = SLIDE_W + 'px';
    slideFrame.style.height = SLIDE_H + 'px';
    container.appendChild(slideFrame);

    totalNum.textContent = String(slides.length).padStart(2, '0');

    // Auto-scale to fit window
    function scaleToFit() {
      const scaleX = window.innerWidth / SLIDE_W;
      const scaleY = window.innerHeight / SLIDE_H;
      const scale = Math.min(scaleX, scaleY);
      container.style.transform = 'scale(' + scale + ')';
    }

    window.addEventListener('resize', scaleToFit);
    window.addEventListener('orientationchange', scaleToFit);
    scaleToFit();

    let activeSrc = '';

    function showSlide(index) {
      if (index < 0) index = 0;
      if (index >= slides.length) index = slides.length - 1;
      currentSlide = index;

      const nextSrc = slides[index];
      slideFrame.classList.remove('active');
      if (activeSrc !== nextSrc) {
        activeSrc = nextSrc;
        slideFrame.onload = () => {
          if (activeSrc === nextSrc) {
            slideFrame.classList.add('active');
          }
        };
        slideFrame.src = nextSrc;
      } else {
        slideFrame.classList.add('active');
      }

      currentNum.textContent = String(index + 1).padStart(2, '0');
      progressBar.style.width = ((index + 1) / slides.length * 100) + '%';
    }

    function nextSlide() {
      if (currentSlide < slides.length - 1) {
        showSlide(currentSlide + 1);
      }
    }

    function prevSlide() {
      if (currentSlide > 0) {
        showSlide(currentSlide - 1);
      }
    }

    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(() => {});
      } else {
        document.exitFullscreen();
      }
    }

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'Enter') {
        e.preventDefault();
        nextSlide();
      } else if (e.key === 'ArrowLeft' || e.key === 'Backspace') {
        e.preventDefault();
        prevSlide();
      } else if (e.key === 'Home') {
        showSlide(0);
      } else if (e.key === 'End') {
        showSlide(slides.length - 1);
      } else if (e.key === 'f' || e.key === 'F') {
        toggleFullscreen();
      }
    });

    // Click to advance (click on right half = next, left half = prev)
    stage.addEventListener('click', (e) => {
      if (e.target.tagName === 'BUTTON') return;
      const x = e.clientX;
      if (x > window.innerWidth / 2) {
        nextSlide();
      } else {
        prevSlide();
      }
    });

    // Initialize first slide
    showSlide(0);
  </script>
</body>
</html>
