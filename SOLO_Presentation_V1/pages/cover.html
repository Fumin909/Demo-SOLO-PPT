<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOLO - Back To The Future</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    /* Cover-specific styles */
    .cover-hero {
      position: absolute;
      top: 50%;
      left: 100px;
      transform: translateY(-55%);
      z-index: 4;
    }

    .cover-hero .subtitle {
      font-family: var(--font-display);
      font-size: 64px;
      font-weight: 800;
      letter-spacing: 12px;
      text-transform: uppercase;
      color: var(--solo-text);
      margin-top: 12px;
      margin-left: 8px;
    }

    .cover-hero .tagline {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 8px;
      text-transform: uppercase;
      color: var(--solo-primary);
      margin-top: 36px;
      margin-left: 8px;
      text-shadow: 0 0 20px var(--solo-primary-glow);
    }

    .team-names {
      position: absolute;
      bottom: 80px;
      left: 100px;
      z-index: 10;
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--solo-text-muted);
    }

    .team-names span {
      margin: 0 6px;
      color: var(--solo-text-dim);
    }

    /* Animation delays */
    .anim-delay-1 { animation-delay: 0.2s; opacity: 0; }
    .anim-delay-2 { animation-delay: 0.5s; opacity: 0; }
    .anim-delay-3 { animation-delay: 0.8s; opacity: 0; }
    .anim-delay-4 { animation-delay: 1.1s; opacity: 0; }

    /* Vignette effect */
    .slide-bg-overlay.cover-overlay {
      background:
        linear-gradient(180deg, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0.2) 40%, rgba(0,0,0,0.85) 100%),
        radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.6) 100%);
    }

    /* Scanline effect for cyberpunk feel */
    .scanlines {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 2;
      opacity: 0.04;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(255,255,255,0.08) 2px,
        rgba(255,255,255,0.08) 4px
      );
    }
  </style>
</head>
<body>
  <section class="slide">
    <!-- Background Layer -->
    <div class="slide-bg">
      <img src="../assets/images/slide-cover.jpg" alt="SOLO Sneakers Cover">
      <div class="slide-bg-overlay cover-overlay"></div>
    </div>

    <!-- Grid Overlay -->
    <div class="grid-lines"></div>

    <!-- Scanline Effect -->
    <div class="scanlines"></div>

    <!-- Corner Accents -->
    <div class="corner-accent top-left"></div>
    <div class="corner-accent bottom-right"></div>

    <!-- Brand Tag (Top Left) -->
    <div class="brand-tag animate-fade anim-delay-1">
      <span class="logo">SOLO</span>
      <span class="divider"></span>
      <span class="tag-text">SR C13</span>
    </div>

    <!-- Hero Content -->
    <div class="cover-hero">
      <h1 class="hero-title animate-fade anim-delay-2">
        BACK TO THE <span class="neon animate-pulse-neon">FUTURE</span>
      </h1>
      <div class="subtitle animate-slide-up anim-delay-3">Sneakers</div>
      <div class="tagline animate-slide-up anim-delay-4">Run For Extraordinary.</div>
    </div>

    <!-- Team Names (Bottom Left) -->
    <div class="team-names animate-fade anim-delay-4">
      TEDDY <span>/</span> JOHNSON <span>/</span> JADE <span>/</span> PASCAL
    </div>

    <!-- Page Number (Bottom Right) -->
    <div class="page-number animate-fade anim-delay-4">
      <span class="current">01</span>
    </div>
  </section>
</body>
</html>
