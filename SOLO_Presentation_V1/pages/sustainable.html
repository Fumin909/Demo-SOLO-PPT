<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOLO - Sustainable Materials</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    /* Slide 12 - Sustainable Materials */

    .slide-sustainable {
      position: relative;
      overflow: hidden;
      background: #050A05;
    }

    /* Green-tinted ambient background */
    .sustainable-bg-tint {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(57,255,20,0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 70% 30%, rgba(57,255,20,0.04) 0%, transparent 40%),
        linear-gradient(135deg, #050A05 0%, #070F07 50%, #050A05 100%);
    }

    /* Right side image with gradient mask */
    .sustainable-image {
      position: absolute;
      top: 0;
      right: 0;
      width: 50%;
      height: 100%;
      z-index: 1;
    }

    .sustainable-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      -webkit-mask-image: linear-gradient(to left, black 50%, transparent 100%);
              mask-image: linear-gradient(to left, black 50%, transparent 100%);
    }

    /* Green nature-tinted overlay on image */
    .sustainable-image::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background:
        linear-gradient(to left, transparent 30%, #050A05 95%),
        linear-gradient(180deg, rgba(5,10,5,0.2) 0%, transparent 30%, rgba(5,10,5,0.4) 100%);
    }

    /* Subtle leaf/nature pattern overlay (SVG-style circles as organic shapes) */
    .nature-particles {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      pointer-events: none;
    }

    .leaf-dot {
      position: absolute;
      border-radius: 50%;
      background: var(--solo-primary);
      opacity: 0.15;
      box-shadow: 0 0 20px var(--solo-primary-glow);
      animation: leafFloat 12s ease-in-out infinite;
    }

    @keyframes leafFloat {
      0%, 100% { transform: translateY(0) scale(1); opacity: 0.1; }
      50% { transform: translateY(-20px) scale(1.2); opacity: 0.25; }
    }

    /* Grid overlay */
    .grid-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      opacity: 0.03;
      background-image:
        linear-gradient(var(--solo-primary) 1px, transparent 1px),
        linear-gradient(90deg, var(--solo-primary) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    /* Corner frames */
    .corner-frame {
      position: absolute;
      width: 60px;
      height: 60px;
      z-index: 10;
    }
    .corner-frame.tl {
      top: 40px;
      left: 40px;
      border-top: 2px solid var(--solo-primary);
      border-left: 2px solid var(--solo-primary);
      box-shadow: -3px -3px 15px var(--solo-primary-glow);
      opacity: 0.7;
    }
    .corner-frame.tr {
      top: 40px;
      right: 40px;
      border-top: 2px solid var(--solo-primary);
      border-right: 2px solid var(--solo-primary);
      opacity: 0.4;
    }
    .corner-frame.bl {
      bottom: 40px;
      left: 40px;
      border-bottom: 2px solid var(--solo-primary);
      border-left: 2px solid var(--solo-primary);
      box-shadow: -3px 3px 15px var(--solo-primary-glow);
      opacity: 0.7;
    }
    .corner-frame.br {
      bottom: 40px;
      right: 40px;
      border-bottom: 2px solid var(--solo-primary);
      border-right: 2px solid var(--solo-primary);
      opacity: 0.4;
    }

    /* Brand mini top right */
    .brand-mini {
      position: absolute;
      top: 60px;
      right: 100px;
      z-index: 10;
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 900;
      letter-spacing: 6px;
      color: var(--solo-text-dim);
    }

    /* Left content area */
    .sustainable-content {
      position: absolute;
      top: 0;
      left: 0;
      width: 55%;
      height: 100%;
      z-index: 10;
      padding: 140px 80px 100px 100px;
      display: flex;
      flex-direction: column;
    }

    /* Title area */
    .sustainable-header {
      margin-bottom: 56px;
    }

    .sustainable-eyebrow {
      display: inline-block;
      font-family: var(--font-mono);
      font-size: 13px;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: var(--solo-primary);
      margin-bottom: 20px;
      padding: 6px 16px;
      border: 1px solid rgba(57, 255, 20, 0.3);
      border-radius: var(--radius-full);
      background: rgba(57, 255, 20, 0.05);
    }

    .title-bar {
      width: 80px;
      height: 4px;
      background: var(--solo-primary);
      margin-bottom: 20px;
      box-shadow: 0 0 20px var(--solo-primary-glow);
    }

    .sustainable-title {
      font-family: var(--font-display);
      font-size: 76px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: -1px;
      line-height: 1;
      color: var(--solo-primary);
      text-shadow: 0 0 50px var(--solo-primary-glow);
    }

    /* Material list */
    .materials-list {
      display: flex;
      flex-direction: column;
      gap: 28px;
      flex: 1;
    }

    /* Material category block */
    .material-block {
      position: relative;
      display: flex;
      align-items: flex-start;
      gap: 24px;
      padding: 24px 28px;
      background: rgba(20, 30, 20, 0.5);
      border: 1px solid rgba(57, 255, 20, 0.2);
      border-radius: var(--radius-md);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: all 0.3s ease;
    }

    .material-block::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 4px;
      height: 100%;
      background: var(--solo-primary);
      box-shadow: 0 0 15px var(--solo-primary-glow);
      border-radius: var(--radius-md) 0 0 var(--radius-md);
    }

    .material-block:hover {
      border-color: rgba(57, 255, 20, 0.5);
      box-shadow: 0 0 30px rgba(57, 255, 20, 0.15);
      transform: translateX(4px);
    }

    /* Material icon */
    .material-icon {
      flex-shrink: 0;
      width: 52px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .icon-circle {
      width: 48px;
      height: 48px;
      border: 2px solid var(--solo-primary);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(57, 255, 20, 0.08);
      box-shadow: 0 0 15px rgba(57, 255, 20, 0.2), inset 0 0 15px rgba(57, 255, 20, 0.05);
    }

    .icon-circle svg {
      width: 24px;
      height: 24px;
      stroke: var(--solo-primary);
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: drop-shadow(0 0 6px var(--solo-primary-glow));
    }

    /* Material text content */
    .material-content {
      flex: 1;
    }

    .material-category {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--solo-primary);
      text-shadow: 0 0 15px var(--solo-primary-glow);
      margin-bottom: 12px;
    }

    .material-items {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .material-tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 18px;
      background: rgba(57, 255, 20, 0.08);
      border: 1px solid rgba(57, 255, 20, 0.25);
      border-radius: var(--radius-full);
      font-size: 16px;
      font-weight: 500;
      color: var(--solo-text);
      letter-spacing: 0.5px;
    }

    .material-tag::before {
      content: '';
      width: 6px;
      height: 6px;
      background: var(--solo-primary);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--solo-primary-glow);
      flex-shrink: 0;
    }

    /* 100% Recyclable callout */
    .recyclable-callout {
      position: absolute;
      bottom: 130px;
      right: 100px;
      z-index: 10;
      text-align: right;
    }

    .callout-ring {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 220px;
      height: 220px;
    }

    /* Rotating outer ring */
    .callout-ring::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 2px dashed rgba(57, 255, 20, 0.4);
      animation: spin 20s linear infinite;
    }

    /* Glowing inner circle */
    .callout-ring::after {
      content: '';
      position: absolute;
      top: 15px;
      left: 15px;
      right: 15px;
      bottom: 15px;
      border-radius: 50%;
      border: 2px solid var(--solo-primary);
      box-shadow:
        0 0 30px var(--solo-primary-glow),
        0 0 60px rgba(57,255,20,0.3),
        inset 0 0 30px rgba(57,255,20,0.1);
      background: radial-gradient(circle, rgba(57,255,20,0.08) 0%, transparent 70%);
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .callout-inner {
      position: relative;
      z-index: 2;
      text-align: center;
    }

    .callout-percent {
      font-family: var(--font-display);
      font-size: 56px;
      font-weight: 900;
      color: var(--solo-primary);
      text-shadow:
        0 0 20px var(--solo-primary-glow),
        0 0 40px var(--solo-primary-glow),
        0 0 80px rgba(57,255,20,0.3);
      line-height: 1;
      letter-spacing: -2px;
      animation: neonPulse 2.5s ease-in-out infinite;
    }

    .callout-label {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 4px;
      color: var(--solo-text);
      margin-top: 6px;
      text-shadow: 0 0 20px rgba(57,255,20,0.4);
    }

    @keyframes neonPulse {
      0%, 100% {
        text-shadow:
          0 0 20px var(--solo-primary-glow),
          0 0 40px var(--solo-primary-glow),
          0 0 80px rgba(57,255,20,0.3);
      }
      50% {
        text-shadow:
          0 0 30px var(--solo-primary-glow),
          0 0 60px var(--solo-primary-glow),
          0 0 100px rgba(57,255,20,0.5);
      }
    }

    /* Recycling icon inside callout */
    .recycle-icon {
      position: absolute;
      top: 18px;
      right: 18px;
      width: 36px;
      height: 36px;
      z-index: 3;
      opacity: 0.7;
    }

    .recycle-icon svg {
      width: 100%;
      height: 100%;
      stroke: var(--solo-primary);
      fill: none;
      stroke-width: 2;
      filter: drop-shadow(0 0 6px var(--solo-primary-glow));
    }

    /* Bottom eco statement */
    .eco-statement {
      position: absolute;
      bottom: 100px;
      left: 100px;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 24px;
      background: rgba(57, 255, 20, 0.06);
      border: 1px solid rgba(57, 255, 20, 0.2);
      border-radius: var(--radius-full);
    }

    .eco-dot {
      width: 8px;
      height: 8px;
      background: var(--solo-primary);
      border-radius: 50%;
      box-shadow: 0 0 10px var(--solo-primary-glow);
      animation: ecoBlink 2s ease-in-out infinite;
    }

    @keyframes ecoBlink {
      0%, 100% { opacity: 1; box-shadow: 0 0 10px var(--solo-primary-glow); }
      50% { opacity: 0.5; box-shadow: 0 0 20px var(--solo-primary-glow); }
    }

    .eco-text {
      font-family: var(--font-mono);
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--solo-primary);
    }

    /* Vertical tech accent line */
    .vertical-accent {
      position: absolute;
      right: 52%;
      top: 200px;
      width: 1px;
      height: 600px;
      background: linear-gradient(to bottom, transparent, var(--solo-primary) 30%, var(--solo-primary) 70%, transparent);
      opacity: 0.2;
      z-index: 3;
      box-shadow: 0 0 10px var(--solo-primary-glow);
    }

    /* Animations */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeSlideRight {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .sustainable-header { animation: fadeInUp 0.8s ease-out forwards; }
    .material-block:nth-child(1) { animation: fadeSlideRight 0.7s ease-out 0.3s forwards; opacity: 0; }
    .material-block:nth-child(2) { animation: fadeSlideRight 0.7s ease-out 0.5s forwards; opacity: 0; }
    .material-block:nth-child(3) { animation: fadeSlideRight 0.7s ease-out 0.7s forwards; opacity: 0; }
    .recyclable-callout { animation: fadeInUp 0.9s ease-out 0.9s forwards; opacity: 0; }
    .eco-statement { animation: fadeInUp 0.7s ease-out 1.1s forwards; opacity: 0; }
  </style>
</head>
<body>
  <div class="slide slide-sustainable">

    <!-- Green-tinted background -->
    <div class="sustainable-bg-tint"></div>

    <!-- Grid texture -->
    <div class="grid-overlay"></div>

    <!-- Right side image with nature tint -->
    <div class="sustainable-image">
      <img src="../assets/images/slide-sustainable.jpg" alt="Sustainable sneakers in nature">
    </div>

    <!-- Vertical accent line between content and image -->
    <div class="vertical-accent"></div>

    <!-- Nature particles (organic glowing dots) -->
    <div class="nature-particles">
      <div class="leaf-dot" style="width: 8px; height: 8px; top: 20%; left: 15%; animation-delay: 0s;"></div>
      <div class="leaf-dot" style="width: 5px; height: 5px; top: 35%; left: 8%; animation-delay: 2s;"></div>
      <div class="leaf-dot" style="width: 10px; height: 10px; top: 60%; left: 12%; animation-delay: 4s;"></div>
      <div class="leaf-dot" style="width: 6px; height: 6px; top: 75%; left: 20%; animation-delay: 1s;"></div>
      <div class="leaf-dot" style="width: 4px; height: 4px; top: 45%; left: 25%; animation-delay: 3s;"></div>
      <div class="leaf-dot" style="width: 7px; height: 7px; top: 85%; left: 35%; animation-delay: 5s;"></div>
      <div class="leaf-dot" style="width: 9px; height: 9px; top: 15%; left: 40%; animation-delay: 2.5s;"></div>
    </div>

    <!-- Corner frames -->
    <div class="corner-frame tl"></div>
    <div class="corner-frame tr"></div>
    <div class="corner-frame bl"></div>
    <div class="corner-frame br"></div>

    <!-- Brand mini top right -->
    <div class="brand-mini">SOLO</div>

    <!-- Left content -->
    <div class="sustainable-content">

      <!-- Header / Title -->
      <div class="sustainable-header">
        <div class="sustainable-eyebrow">Eco-Friendly Construction</div>
        <div class="title-bar"></div>
        <h1 class="sustainable-title">SUSTAINABLE<br>MATERIALS</h1>
      </div>

      <!-- Materials list -->
      <div class="materials-list">

        <!-- Upper -->
        <div class="material-block">
          <div class="material-icon">
            <div class="icon-circle">
              <!-- Fabric / weave icon -->
              <svg viewBox="0 0 24 24">
                <path d="M4 6 L20 6 M4 12 L20 12 M4 18 L20 18 M7 3 L9 21 M12 3 L14 21 M17 3 L19 21"/>
              </svg>
            </div>
          </div>
          <div class="material-content">
            <div class="material-category">Upper</div>
            <div class="material-items">
              <span class="material-tag">Organic Cotton</span>
              <span class="material-tag">Hemp Fabric</span>
            </div>
          </div>
        </div>

        <!-- Midsole -->
        <div class="material-block">
          <div class="material-icon">
            <div class="icon-circle">
              <!-- Layered midsole icon -->
              <svg viewBox="0 0 24 24">
                <path d="M3 8 Q12 4 21 8 L21 11 Q12 7 3 11 Z"/>
                <path d="M3 12 Q12 8 21 12 L21 15 Q12 11 3 15 Z"/>
                <path d="M3 16 Q12 12 21 16 L21 19 Q12 15 3 19 Z"/>
              </svg>
            </div>
          </div>
          <div class="material-content">
            <div class="material-category">Midsole</div>
            <div class="material-items">
              <span class="material-tag">EVA</span>
              <span class="material-tag">Natural Rubber</span>
            </div>
          </div>
        </div>

        <!-- Dyes & Decorations -->
        <div class="material-block">
          <div class="material-icon">
            <div class="icon-circle">
              <!-- Droplet / dye icon -->
              <svg viewBox="0 0 24 24">
                <path d="M12 2.5 C12 2.5 5 11 5 15.5 C5 19.5 8 22 12 22 C16 22 19 19.5 19 15.5 C19 11 12 2.5 12 2.5 Z"/>
                <path d="M9 15 C9 16.5 10.5 18 12 18"/>
              </svg>
            </div>
          </div>
          <div class="material-content">
            <div class="material-category">Dyes &amp; Decorations</div>
            <div class="material-items">
              <span class="material-tag">Natural Dyes</span>
              <span class="material-tag">Water-Based Adhesives</span>
            </div>
          </div>
        </div>

      </div>
    </div>

    <!-- 100% Recyclable callout (right side over image area) -->
    <div class="recyclable-callout">
      <div class="callout-ring">
        <div class="recycle-icon">
          <svg viewBox="0 0 24 24">
            <path d="M7 19 L4 13 L7 7"/>
            <path d="M17 5 L20 11 L17 17"/>
            <path d="M4 13 L11 13 L8.5 17"/>
            <path d="M20 11 L13 11 L15.5 7"/>
            <path d="M8.5 7 L12 3 L15.5 7"/>
          </svg>
        </div>
        <div class="callout-inner">
          <div class="callout-percent">100%</div>
          <div class="callout-label">Recyclable</div>
        </div>
      </div>
    </div>

    <!-- Bottom eco statement -->
    <div class="eco-statement">
      <span class="eco-dot"></span>
      <span class="eco-text">Natural Meets Technology</span>
    </div>

    <!-- Page number -->
    <div class="page-number">
      <span class="caption">PAGE</span>
      <span class="current">12</span>
    </div>

  </div>
</body>
</html>
