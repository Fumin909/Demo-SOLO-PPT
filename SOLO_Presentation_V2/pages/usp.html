<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../css/design-system.css">
<style>
  .bg { position:absolute; inset:0; z-index:0; }
  .bg img { width:100%; height:100%; object-fit:cover; filter:grayscale(100%) brightness(0.6); }
  .bg-overlay { position:absolute; inset:0; background: rgba(0,0,0,0.5); z-index:1; }
  h1.usp-title { position:absolute; top:50px; left:50%; transform:translateX(-50%); font-family:'Anton',sans-serif; font-size:95px; color:var(--neon-green); text-shadow:0 0 20px var(--neon-green), 0 0 50px rgba(57,255,20,0.5); letter-spacing:5px; text-transform:uppercase; z-index:10; white-space:nowrap; line-height:1; }
  .table-area { position:absolute; top:200px; left:180px; right:180px; bottom:60px; z-index:8; display:grid; grid-template-columns: 1fr 1fr 1fr 1fr; grid-template-rows: auto 1fr 1fr 1fr; gap:6px; }
  .cell { background: rgba(255,255,255,0.95); display:flex; align-items:center; justify-content:center; font-family:'Anton',sans-serif; color:#111; font-size:36px; letter-spacing:2px; text-transform:uppercase; text-align:center; padding:16px; border-radius:4px; }
  .cell.head { background: rgba(255,255,255,0.9); font-size:40px; }
  .cell.brand { font-size:72px; letter-spacing:4px; }
  .cell.brand-nike { font-family:'Impact',sans-serif; font-style:italic; font-weight:900; font-size:72px; }
  .cell.brand-converse { position:relative; }
  .cell.brand-converse .star { font-size:80px; color:#111; }
  .cell.brand-solo { font-size:72px; letter-spacing:4px; }
  .cell.brand-solo .s-c { color:var(--magenta); }
  .cell.brand-solo .o1-c { color:var(--hot-pink); }
  .cell.brand-solo .l-c { color:var(--olive); }
  .cell.brand-solo .o2-c { color:var(--neon-green); }
  .mark-check { color:var(--neon-green); font-size:100px; line-height:1; font-weight:900; text-shadow:3px 3px 0 rgba(0,0,0,0.1); }
  .mark-x { color:var(--red-label); font-size:100px; line-height:1; font-weight:900; text-shadow:3px 3px 0 rgba(0,0,0,0.1); }
  .corner-logo { position:absolute; top:30px; right:40px; z-index:20; }
  .corner-logo .solo-logo { position:static; font-size:56px; }
</style>
</head>
<body>
<div class="slide">
  <div class="bg"><img src="../assets/concrete_bg.jpg" alt=""></div>
  <div class="bg-overlay"></div>

  <h1 class="usp-title">COMPETITIVE ADVANTAGES</h1>

  <div class="table-area">
    <div class="cell head">USP</div>
    <div class="cell head">CREATIVE WORKSHOP</div>
    <div class="cell head">CREATOR INCENTIVE PROGRAM</div>
    <div class="cell head">100% RECYCABLE</div>

    <div class="cell brand brand-nike">NIKE</div>
    <div class="cell"><span class="mark-check">&#10003;</span></div>
    <div class="cell"><span class="mark-x">&#10007;</span></div>
    <div class="cell"><span class="mark-x">&#10007;</span></div>

    <div class="cell brand brand-converse"><span style="font-size:64px; font-weight:900; letter-spacing:1px;">CONVERSE</span></div>
    <div class="cell"><span class="mark-check">&#10003;</span></div>
    <div class="cell"><span class="mark-x">&#10007;</span></div>
    <div class="cell"><span class="mark-x">&#10007;</span></div>

    <div class="cell brand brand-solo">
      <span class="s-c">S</span><span class="o1-c">O</span><span class="l-c">L</span><span class="o2-c">O</span>
    </div>
    <div class="cell"><span class="mark-check">&#10003;</span></div>
    <div class="cell"><span class="mark-check">&#10003;</span></div>
    <div class="cell"><span class="mark-check">&#10003;</span></div>
  </div>

  <div class="corner-logo">
    <div class="solo-logo"><span class="s-letter">S</span><span class="o1-letter">O</span><span class="l-letter">L</span><span class="o2-letter">O</span></div>
  </div>
</div>
</body>
</html>
