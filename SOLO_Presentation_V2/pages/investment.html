<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../css/design-system.css">
<style>
  .bg { position:absolute; inset:0; z-index:0; }
  .bg img { width:100%; height:100%; object-fit:cover; filter:grayscale(100%) contrast(1.1); }
  .bg-overlay { position:absolute; inset:0; background: rgba(0,0,0,0.45); z-index:1; }
  .invest-title { position:absolute; top:50px; left:50%; transform:translateX(-50%); background:var(--neon-green); color:#000; font-family:'Anton',sans-serif; font-size:72px; letter-spacing:3px; padding:16px 50px; border-radius:40px; z-index:10; text-transform:uppercase; box-shadow:0 8px 30px rgba(57,255,20,0.4); line-height:1; }
  .chart-area { position:absolute; top:200px; left:50%; transform:translateX(-50%); width:800px; height:700px; z-index:5; }
  /* Pie chart using conic-gradient */
  .pie { width:520px; height:520px; border-radius:50%; position:relative; margin:60px auto 0;
    background: conic-gradient(
      #5CE0E6 0% 40%,
      #30B0D0 40% 60%,
      #2070B0 60% 75%,
      #30A0C0 75% 95%,
      #203060 95% 100%
    );
    box-shadow:0 20px 60px rgba(0,0,0,0.5);
  }
  .pie-center { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:200px; height:200px; border-radius:50%; background:rgba(0,0,0,0.3); }
  .label { position:absolute; background:var(--neon-green); color:#000; font-family:'Anton',sans-serif; font-size:32px; letter-spacing:1px; padding:10px 24px; border-radius:30px; text-transform:uppercase; white-space:nowrap; z-index:8; box-shadow:0 4px 15px rgba(0,0,0,0.3); }
  .label .pct { background:rgba(0,200,60,0.9); color:#000; font-family:'Anton',sans-serif; font-size:42px; padding:6px 20px; border-radius:30px; margin-left:12px; display:inline-block; }
  .lbl-production { top:260px; right:40px; }
  .lbl-production .pct { display:block; margin:6px 0 0 0; text-align:center; }
  .lbl-rd { bottom:120px; left:50%; transform:translateX(-50%); }
  .lbl-platform { bottom:180px; left:60px; }
  .lbl-marketing { top:180px; left:100px; }
  .lbl-contingency { top:140px; left:50%; transform:translateX(-30%); }
  .corner-logo { position:absolute; top:30px; right:40px; z-index:20; }
  .corner-logo .solo-logo { position:static; font-size:56px; }
</style>
</head>
<body>
<div class="slide">
  <div class="bg"><img src="../assets/skatepark_bg.jpg" alt=""></div>
  <div class="bg-overlay"></div>

  <div class="invest-title">Investment&mdash;$4 Million</div>

  <div class="chart-area">
    <div class="pie">
      <div class="pie-center"></div>
    </div>
  </div>

  <div class="label lbl-production">Production<span class="pct">40%</span></div>
  <div class="label lbl-rd">R&D<span class="pct" style="display:inline;margin-left:12px;">20%</span></div>
  <div class="label lbl-platform">Platform Management<span class="pct" style="display:inline;margin-left:12px;">15%</span></div>
  <div class="label lbl-marketing">Marketing and promotion<span class="pct" style="display:inline;margin-left:12px;">20%</span></div>
  <div class="label lbl-contingency">Contingency<span class="pct" style="display:inline;margin-left:12px;">5%</span></div>

  <div class="corner-logo">
    <div class="solo-logo"><span class="s-letter">S</span><span class="o1-letter">O</span><span class="l-letter">L</span><span class="o2-letter">O</span></div>
  </div>
</div>
</body>
</html>
