<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../css/design-system.css">
<style>
  .bg { position:absolute; inset:0; z-index:0; }
  .bg img { width:100%; height:100%; object-fit:cover; }
  .left-panel { position:absolute; left:0; top:0; bottom:0; width:440px; background:#2d6b2d; z-index:2; border-right:6px solid #1a4a1a; }
  .left-panel h1 { font-family:'Anton',sans-serif; font-size:80px; color:var(--neon-green); text-shadow:0 0 20px var(--neon-green); letter-spacing:3px; text-transform:uppercase; padding:40px 40px 20px; line-height:1; }
  .sdg-badge { position:absolute; left:40px; top:180px; display:flex; align-items:center; gap:20px; }
  .sdg-num { font-family:'Anton',sans-serif; font-size:140px; color:#fff; line-height:1; }
  .sdg-label { font-family:'Anton',sans-serif; font-size:42px; color:#fff; letter-spacing:2px; text-transform:uppercase; line-height:1.1; }
  .eye-icon { position:absolute; left:40px; bottom:200px; width:280px; height:180px; }
  .content-card { position:absolute; left:540px; top:50%; transform:translateY(-50%); background:rgba(45,107,45,0.92); border-radius:50px; padding:48px 56px; z-index:5; width:800px; box-shadow:0 20px 60px rgba(0,0,0,0.4); }
  .content-card h3 { font-family:'Anton',sans-serif; font-size:52px; color:#fff; letter-spacing:2px; text-transform:uppercase; margin-bottom:10px; line-height:1.1; }
  .content-card ul { list-style:none; padding:0; }
  .content-card ul li { font-family:'Inter',sans-serif; font-size:38px; color:#fff; font-weight:700; line-height:1.5; padding-left:30px; position:relative; margin-bottom:4px; }
  .content-card ul li::before { content:'●'; position:absolute; left:0; color:#fff; font-size:18px; top:12px; }
  .corner-logo { position:absolute; top:30px; right:40px; z-index:20; }
  .corner-logo .solo-logo { position:static; font-size:56px; }
</style>
</head>
<body>
<div class="slide">
  <div class="bg"><img src="../assets/solar_panels.jpg" alt=""></div>

  <div class="left-panel">
    <h1>SUSTAINABLE MATERIALS</h1>
    <div class="sdg-badge">
      <div class="sdg-num">13</div>
      <div class="sdg-label">CLIMATE<br>ACTION</div>
    </div>
    <!-- SDG eye icon -->
    <svg class="eye-icon" viewBox="0 0 280 180" fill="none">
      <path d="M140 20 Q60 20 20 90 Q60 160 140 160 Q220 160 260 90 Q220 20 140 20 Z" fill="#fff"/>
      <!-- Earth globe -->
      <circle cx="140" cy="90" r="50" fill="#2d6b2d"/>
      <path d="M110 90 Q140 60 170 90 Q140 120 110 90 Z" fill="#4a9e4a"/>
      <path d="M140 50 Q160 90 140 130" stroke="#4a9e4a" stroke-width="4" fill="none"/>
      <path d="M100 90 Q140 110 180 90" stroke="#4a9e4a" stroke-width="4" fill="none"/>
      <ellipse cx="140" cy="90" rx="50" ry="50" stroke="#2d6b2d" stroke-width="2" fill="none"/>
      <!-- Continents simplified -->
      <path d="M115 75 Q130 70 140 80 Q150 72 160 85 Q155 95 145 90 Q130 100 120 92 Z" fill="#4a9e4a"/>
      <path d="M125 100 Q140 95 155 105 Q148 115 135 110 Z" fill="#4a9e4a"/>
    </svg>
  </div>

  <div class="content-card">
    <h3>Upper materials</h3>
    <ul>
      <li>Organic cotton</li>
      <li>Hemp fabric</li>
    </ul>
    <h3 style="margin-top:18px;">Midsole materials</h3>
    <ul>
      <li>EVA</li>
      <li>natural rubber</li>
    </ul>
    <h3 style="margin-top:18px;">Dyes and decorations</h3>
    <ul>
      <li>Natural dyes</li>
      <li>Water-based Adhesives</li>
    </ul>
  </div>

  <div class="corner-logo">
    <div class="solo-logo"><span class="s-letter">S</span><span class="o1-letter">O</span><span class="l-letter">L</span><span class="o2-letter">O</span></div>
  </div>
</div>
</body>
</html>
