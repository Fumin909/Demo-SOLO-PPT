<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../css/design-system.css">
<style>
  .about-grid { position: absolute; inset: 0; z-index: 1; }
  .quad { position: absolute; overflow: hidden; }
  .quad img { width: 100%; height: 100%; object-fit: cover; }
  .quad.q1 { top:0; left:0; width:960px; height:540px; }
  .quad.q2 { top:0; left:960px; width:960px; height:540px; }
  .quad.q3 { top:540px; left:0; width:960px; height:540px; }
  .quad.q4 { top:540px; left:960px; width:960px; height:540px; }
  .quad-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.4); }
  .q2 .quad-overlay { background: linear-gradient(135deg, rgba(57,255,20,0.08), rgba(0,0,0,0.55)); }
  .q-title { position: absolute; top: 60px; left: 70px; font-family: 'Anton', sans-serif; font-size: 130px; color: var(--neon-green); text-shadow: 0 0 20px var(--neon-green), 0 0 50px rgba(57,255,20,0.6); letter-spacing: 4px; text-transform: uppercase; z-index: 5; line-height:1; }
  .solo-logo-c { position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%); z-index: 10; font-family: 'Anton', sans-serif; font-size: 160px; letter-spacing: 6px; pointer-events: none; }
  .solo-logo-c span { text-shadow: 4px 4px 0 rgba(0,0,0,0.6); }
  .solo-logo-c .s-l { color: var(--magenta); }
  .solo-logo-c .o1-l { color: var(--hot-pink); }
  .solo-logo-c .l-l { color: var(--olive); }
  .solo-logo-c .o2-l { color: var(--neon-green); }
  .speech-bubble { position: absolute; background: rgba(255,255,255,0.94); border-radius: 32px; padding: 22px 30px; max-width: 560px; z-index: 8; }
  .speech-bubble h3 { font-family: 'Anton', sans-serif; font-size: 48px; color: var(--neon-green); letter-spacing: 2px; margin-bottom: 6px; text-transform: uppercase; line-height:1; }
  .speech-bubble p { font-family: 'Inter', sans-serif; font-size: 28px; font-weight: 700; line-height: 1.35; color: #111; }
  .bubble-mission { top: 120px; right: 50px; max-width: 620px; }
  .bubble-mission::before { content:''; position:absolute; top:-22px; left:50px; width:0;height:0; border-left:20px solid transparent; border-right:20px solid transparent; border-bottom:24px solid rgba(255,255,255,0.94); }
  .bubble-vision { bottom: 60px; left: 50px; max-width: 580px; }
  .bubble-vision::after { content:''; position:absolute; bottom:-22px; right:60px; width:0;height:0; border-left:20px solid transparent; border-right:20px solid transparent; border-top:24px solid rgba(255,255,255,0.94); }
  .slogan-txt { position: absolute; bottom: 60px; right: 50px; z-index: 8; font-family: 'Anton', sans-serif; font-size: 78px; color: var(--neon-green); text-shadow: 0 0 20px var(--neon-green), 0 0 40px rgba(57,255,20,0.6); letter-spacing: 3px; text-transform: uppercase; text-align: right; line-height:1; }
  .corner-logo { position: absolute; top: 28px; right: 45px; z-index: 20; }
  .corner-logo .solo-logo { position: static; font-size: 56px; }
</style>
</head>
<body>
<div class="slide">
  <div class="about-grid">
    <div class="quad q1"><img src="../assets/neon_running.jpg" alt=""><div class="quad-overlay"></div></div>
    <div class="quad q2"><img src="../assets/neon_running.jpg" alt="" style="transform:scaleX(-1);"><div class="quad-overlay"></div></div>
    <div class="quad q3"><img src="../assets/neon_running.jpg" alt="" style="filter:hue-rotate(30deg);"><div class="quad-overlay"></div></div>
    <div class="quad q4"><img src="../assets/neon_running.jpg" alt="" style="filter:hue-rotate(-30deg) saturate(1.3);"><div class="quad-overlay"></div></div>
  </div>

  <div class="q-title">ABOUT US</div>

  <div class="solo-logo-c">
    <span class="s-l">S</span><span class="o1-l">O</span><span class="l-l">L</span><span class="o2-l">O</span>
  </div>

  <div class="speech-bubble bubble-mission">
    <h3>Mission:</h3>
    <p>Encourage individuals to embrace their uniqueness, committing each step for the future of the planet.</p>
  </div>

  <div class="speech-bubble bubble-vision">
    <h3>Vision:</h3>
    <p>To be a global leader in eco-friendly athletic footwear, enabling personalized expression through innovative design.</p>
  </div>

  <div class="slogan-txt">Run for extraordinary.</div>

  <div class="corner-logo">
    <div class="solo-logo"><span class="s-letter">S</span><span class="o1-letter">O</span><span class="l-letter">L</span><span class="o2-letter">O</span></div>
  </div>
</div>
</body>
</html>
