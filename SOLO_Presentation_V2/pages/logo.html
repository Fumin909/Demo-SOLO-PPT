<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../css/design-system.css">
<style>
  body { background:#000; }
  .slide { background:#000; display:flex; align-items:center; justify-content:center; position:relative; }
  .solo-huge {
    font-family: 'Anton', Impact, sans-serif;
    font-size: 520px;
    line-height: 0.85;
    letter-spacing: 20px;
    display: flex;
    text-shadow: 0 0 40px rgba(255,20,147,0.5), 0 0 80px rgba(57,255,20,0.3);
  }
  .solo-huge .s-l { color: var(--magenta); }
  .solo-huge .o1-l { color: var(--hot-pink); }
  .solo-huge .l-l { color: var(--olive); }
  .solo-huge .o2-l { color: var(--neon-green); }
  /* Splatter dots around */
  .splatter { position:absolute; border-radius:50%; background:var(--hot-pink); opacity:0.7; }
  .s1 { width:18px; height:18px; top:280px; left:320px; }
  .s2 { width:10px; height:10px; top:300px; left:360px; background:var(--magenta); }
  .s3 { width:8px; height:8px; top:260px; left:390px; background:var(--neon-green); }
  .s4 { width:14px; height:14px; top:220px; left:780px; background:var(--magenta); }
  .s5 { width:6px; height:6px; top:200px; left:820px; background:var(--hot-pink); }
  .s6 { width:20px; height:20px; top:240px; right:280px; background:var(--neon-green); }
  .s7 { width:8px; height:8px; top:260px; right:240px; }
  .s8 { width:12px; height:12px; bottom:280px; right:360px; background:var(--neon-green); }
  .s9 { width:6px; height:6px; bottom:320px; right:400px; background:var(--magenta); }
  .s10 { width:10px; height:10px; bottom:260px; left:420px; background:var(--olive); }
</style>
</head>
<body>
<div class="slide">
  <div class="solo-huge">
    <span class="s-l">S</span><span class="o1-l">O</span><span class="l-l">L</span><span class="o2-l">O</span>
  </div>
  <div class="splatter s1"></div>
  <div class="splatter s2"></div>
  <div class="splatter s3"></div>
  <div class="splatter s4"></div>
  <div class="splatter s5"></div>
  <div class="splatter s6"></div>
  <div class="splatter s7"></div>
  <div class="splatter s8"></div>
  <div class="splatter s9"></div>
  <div class="splatter s10"></div>
</div>
</body>
</html>
