<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../css/design-system.css">
<style>
  .bg { position:absolute; inset:0; z-index:0; background:#1a1a1a; }
  .bg img { width:100%; height:100%; object-fit:cover; opacity:0.35; filter:grayscale(30%); }
  .bg-overlay { position:absolute; inset:0; background: linear-gradient(135deg, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.5) 100%); z-index:1; }
  h1.m-title { position:absolute; top:50px; left:80px; font-family:'Anton',sans-serif; font-size:90px; color:var(--neon-green); text-shadow:0 0 20px var(--neon-green); letter-spacing:4px; text-transform:uppercase; z-index:10; line-height:1.1; }
  h1.d-title { position:absolute; top:50px; right:80px; font-family:'Anton',sans-serif; font-size:90px; color:var(--neon-green); text-shadow:0 0 20px var(--neon-green); letter-spacing:4px; text-transform:uppercase; z-index:10; line-height:1.1; text-align:right; }
  .center-circle { position:absolute; left:50%; top:52%; transform:translate(-50%,-50%); width:440px; height:440px; border-radius:50%; background:var(--neon-green); display:flex; align-items:center; justify-content:center; z-index:8; box-shadow:0 0 60px rgba(57,255,20,0.4); }
  .center-circle span { font-family:'Anton',sans-serif; font-size:72px; color:#000; text-align:center; line-height:1.15; letter-spacing:2px; text-transform:uppercase; }
  .left-col { position:absolute; left:80px; top:280px; z-index:10; max-width:520px; }
  .right-col { position:absolute; right:80px; top:280px; z-index:10; max-width:520px; text-align:right; }
  .m-item { display:flex; align-items:flex-start; gap:20px; margin-bottom:36px; }
  .r-item { display:flex; align-items:flex-start; gap:20px; margin-bottom:36px; flex-direction:row-reverse; }
  .shoe-icon { width:60px; height:60px; flex-shrink:0; }
  .m-item .shoe-icon { margin-top:4px; }
  .r-item .shoe-icon { margin-top:4px; }
  .m-item .txt { font-family:'Inter',sans-serif; font-size:36px; color:#fff; font-weight:700; line-height:1.3; }
  .r-item .txt { font-family:'Inter',sans-serif; font-size:36px; color:#fff; font-weight:700; line-height:1.3; text-align:right; }
  .m-item .txt strong { color:var(--neon-green); font-family:'Anton',sans-serif; font-size:40px; letter-spacing:2px; text-transform:uppercase; }
  .r-item .txt strong { color:var(--neon-green); font-family:'Anton',sans-serif; font-size:40px; letter-spacing:2px; text-transform:uppercase; }
  .corner-logo { position:absolute; top:30px; right:40px; z-index:20; }
  .corner-logo .solo-logo { position:static; font-size:56px; }
</style>
</head>
<body>
<div class="slide">
  <div class="bg"><img src="../assets/sneaker_product.jpg" alt=""></div>
  <div class="bg-overlay"></div>

  <h1 class="m-title">MARKETING<br>METHODS</h1>
  <h1 class="d-title">DISTRIBUTION<br>CHANNELS</h1>

  <div class="center-circle"><span>How do we<br>reach our<br>market?</span></div>

  <div class="left-col">
    <div class="m-item">
      <svg class="shoe-icon" viewBox="0 0 64 64" fill="none" stroke="#39FF14" stroke-width="2.5">
        <path d="M8 44 Q8 32 20 30 L28 28 Q36 26 40 30 L52 38 Q58 42 56 48 L8 48 Z"/>
        <path d="M22 30 L22 22 Q22 18 26 18 L30 18 Q34 18 34 22 L34 28"/>
        <line x1="12" y1="48" x2="12" y2="54"/><line x1="20" y1="48" x2="20" y2="54"/>
        <line x1="28" y1="48" x2="28" y2="54"/><line x1="36" y1="48" x2="36" y2="54"/>
        <line x1="44" y1="48" x2="44" y2="54"/><line x1="52" y1="48" x2="52" y2="54"/>
        <path d="M28 34 L32 32 M34 36 L38 34" stroke-linecap="round"/>
      </svg>
      <div class="txt"><strong>Collaborate</strong><br>with college campus design majors</div>
    </div>
    <div class="m-item">
      <svg class="shoe-icon" viewBox="0 0 64 64" fill="none" stroke="#39FF14" stroke-width="2.5">
        <path d="M8 44 Q8 32 20 30 L28 28 Q36 26 40 30 L52 38 Q58 42 56 48 L8 48 Z"/>
        <path d="M22 30 L22 22 Q22 18 26 18 L30 18 Q34 18 34 22 L34 28"/>
        <line x1="12" y1="48" x2="12" y2="54"/><line x1="20" y1="48" x2="20" y2="54"/>
        <line x1="28" y1="48" x2="28" y2="54"/><line x1="36" y1="48" x2="36" y2="54"/>
        <line x1="44" y1="48" x2="44" y2="54"/><line x1="52" y1="48" x2="52" y2="54"/>
      </svg>
      <div class="txt"><strong>Participate</strong><br>in sneakers exhibitions</div>
    </div>
    <div class="m-item">
      <svg class="shoe-icon" viewBox="0 0 64 64" fill="none" stroke="#39FF14" stroke-width="2.5">
        <path d="M8 44 Q8 32 20 30 L28 28 Q36 26 40 30 L52 38 Q58 42 56 48 L8 48 Z"/>
        <path d="M22 30 L22 22 Q22 18 26 18 L30 18 Q34 18 34 22 L34 28"/>
        <line x1="12" y1="48" x2="12" y2="54"/><line x1="20" y1="48" x2="20" y2="54"/>
        <line x1="28" y1="48" x2="28" y2="54"/><line x1="36" y1="48" x2="36" y2="54"/>
        <line x1="44" y1="48" x2="44" y2="54"/><line x1="52" y1="48" x2="52" y2="54"/>
      </svg>
      <div class="txt"><strong>Social media</strong><br>such as tiktok, instagram, facebook etc.</div>
    </div>
  </div>

  <div class="right-col">
    <div class="r-item">
      <svg class="shoe-icon" viewBox="0 0 64 64" fill="none" stroke="#39FF14" stroke-width="2.5">
        <path d="M8 44 Q8 32 20 30 L28 28 Q36 26 40 30 L52 38 Q58 42 56 48 L8 48 Z"/>
        <path d="M22 30 L22 22 Q22 18 26 18 L30 18 Q34 18 34 22 L34 28"/>
        <line x1="12" y1="48" x2="12" y2="54"/><line x1="20" y1="48" x2="20" y2="54"/>
        <line x1="28" y1="48" x2="28" y2="54"/><line x1="36" y1="48" x2="36" y2="54"/>
        <line x1="44" y1="48" x2="44" y2="54"/><line x1="52" y1="48" x2="52" y2="54"/>
      </svg>
      <div class="txt"><strong>Online</strong><br>official website</div>
    </div>
    <div class="r-item">
      <svg class="shoe-icon" viewBox="0 0 64 64" fill="none" stroke="#39FF14" stroke-width="2.5">
        <path d="M8 44 Q8 32 20 30 L28 28 Q36 26 40 30 L52 38 Q58 42 56 48 L8 48 Z"/>
        <path d="M22 30 L22 22 Q22 18 26 18 L30 18 Q34 18 34 22 L34 28"/>
        <line x1="12" y1="48" x2="12" y2="54"/><line x1="20" y1="48" x2="20" y2="54"/>
        <line x1="28" y1="48" x2="28" y2="54"/><line x1="36" y1="48" x2="36" y2="54"/>
        <line x1="44" y1="48" x2="44" y2="54"/><line x1="52" y1="48" x2="52" y2="54"/>
      </svg>
      <div class="txt"><strong>Offline</strong><br>Cooperate with malls, sports equipment stores etc.</div>
    </div>
  </div>

  <div class="corner-logo">
    <div class="solo-logo"><span class="s-letter">S</span><span class="o1-letter">O</span><span class="l-letter">L</span><span class="o2-letter">O</span></div>
  </div>
</div>
</body>
</html>
