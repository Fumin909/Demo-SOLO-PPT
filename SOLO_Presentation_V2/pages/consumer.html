<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../css/design-system.css">
<style>
  .bg { position:absolute; inset:0; z-index:0; }
  .bg img { width:100%; height:100%; object-fit:cover; filter: saturate(0.8) brightness(0.55) hue-rotate(160deg); }
  .bg-overlay { position:absolute; inset:0; background: linear-gradient(180deg, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.6) 100%); z-index:1; }
  h1.cp-title { position:absolute; top:40px; left:80px; font-family:'Anton',sans-serif; font-size:115px; color:var(--neon-green); text-shadow:0 0 20px var(--neon-green), 0 0 50px rgba(57,255,20,0.5); letter-spacing:5px; text-transform:uppercase; z-index:10; line-height:1; }
  .circle-frame { position:absolute; left:50%; top:52%; transform:translate(-50%,-50%); width:580px; height:580px; border-radius:50%; overflow:hidden; border:8px solid rgba(57,255,20,0.3); box-shadow:0 0 60px rgba(57,255,20,0.4); z-index:5; }
  .circle-frame img { width:100%; height:100%; object-fit:cover; }
  .cp-tag { position:absolute; z-index:10; }
  .cp-tag .tag-head { background:var(--neon-green); color:#000; font-family:'Anton',sans-serif; font-size:44px; letter-spacing:2px; padding:10px 26px; border-radius:22px; display:inline-block; margin-bottom:10px; text-transform:uppercase; }
  .cp-tag .tag-body { font-family:'Inter',sans-serif; font-size:36px; color:#fff; font-weight:700; line-height:1.3; text-shadow:0 2px 8px rgba(0,0,0,0.8); }
  .tag-needs { top:260px; left:90px; max-width:340px; }
  .tag-age { bottom:180px; left:220px; }
  .tag-geo { top:240px; right:90px; text-align:right; }
  .tag-geo .tag-body { text-align:right; }
  .tag-life { bottom:260px; right:90px; text-align:right; max-width:380px; }
  .tag-life .tag-body { text-align:right; }
  .tag-bottom { position:absolute; bottom:40px; left:0; right:0; text-align:center; z-index:10; font-family:'Anton',sans-serif; font-size:80px; color:var(--neon-green); letter-spacing:4px; text-transform:uppercase; text-shadow:0 0 25px var(--neon-green), 0 0 60px rgba(57,255,20,0.5); line-height:1; }
  .corner-logo { position:absolute; top:30px; right:40px; z-index:20; }
  .corner-logo .solo-logo { position:static; font-size:56px; }
</style>
</head>
<body>
<div class="slide">
  <div class="bg"><img src="../assets/sneaker_product.jpg" alt=""></div>
  <div class="bg-overlay"></div>

  <h1 class="cp-title">CONSUMER PROFILE</h1>

  <div class="circle-frame"><img src="../assets/consumer_couple.jpg" alt="Consumers"></div>

  <div class="cp-tag tag-needs">
    <div class="tag-head">Specific needs</div>
    <div class="tag-body">
      ● Versatile sporty sneakers<br>
      ● All-day wear
    </div>
  </div>

  <div class="cp-tag tag-age">
    <div class="tag-head">Age</div>
    <div class="tag-body">12-45</div>
  </div>

  <div class="cp-tag tag-geo">
    <div class="tag-head">Geographic area</div>
    <div class="tag-body">Asian countries</div>
  </div>

  <div class="cp-tag tag-life">
    <div class="tag-head">Lifestyle</div>
    <div class="tag-body">Looking for Unique designs</div>
  </div>

  <div class="tag-bottom">YOUR DREAM, WE'LL PAY FOR IT</div>

  <div class="corner-logo">
    <div class="solo-logo"><span class="s-letter">S</span><span class="o1-letter">O</span><span class="l-letter">L</span><span class="o2-letter">O</span></div>
  </div>
</div>
</body>
</html>
