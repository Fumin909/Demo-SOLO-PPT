<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <title>SOLO - Back To The Future Sneakers V2</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      color: #fff;
      font-family: Inter, Helvetica, Arial, sans-serif;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .stage {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      height: 100svh;
      height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: #000;
      cursor: pointer;
      z-index: 1;
    }
    .presentation-container {
      position: absolute;
      width: 1920px;
      height: 1080px;
      transform-origin: center center;
      background: #000;
      will-change: transform;
      pointer-events: none;
    }
    .slide-frame {
      position: absolute;
      inset: 0;
      width: 1920px;
      height: 1080px;
      border: 0;
      opacity: 0;
      transition: opacity 0.45s ease;
      pointer-events: none;
    }
    .slide-frame.active {
      opacity: 1;
    }
    .progress-bar {
      position: fixed;
      top: 0;
      left: 0;
      height: 3px;
      background: linear-gradient(90deg, #39FF14, #FF1493);
      z-index: 100;
      transition: width 0.35s ease;
      box-shadow: 0 0 14px rgba(57, 255, 20, 0.55);
    }
    .fullscreen-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 200;
      border: 1px solid rgba(57, 255, 20, 0.34);
      border-radius: 999px;
      padding: 8px 14px;
      background: rgba(0, 0, 0, 0.55);
      color: #39FF14;
      cursor: pointer;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 1px;
      -webkit-tap-highlight-color: transparent;
    }
    .fullscreen-btn:hover {
      background: rgba(57, 255, 20, 0.2);
      border-color: #39FF14;
    }
    .pdf-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 200;
      border: 1px solid rgba(255, 20, 147, 0.45);
      border-radius: 999px;
      padding: 8px 14px;
      background: rgba(0, 0, 0, 0.55);
      color: #FF1493;
      cursor: pointer;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 1px;
      -webkit-tap-highlight-color: transparent;
      transition: all 0.3s;
    }
    .pdf-btn:hover {
      background: rgba(255, 20, 147, 0.2);
      border-color: #FF1493;
    }
    .pdf-btn:disabled {
      opacity: 0.5;
      cursor: wait;
    }
    .pdf-progress {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.92);
      border: 1px solid rgba(57,255,20,0.4);
      color: #39FF14;
      padding: 20px 32px;
      border-radius: 16px;
      font-size: 15px;
      z-index: 9999;
      text-align: center;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      min-width: 240px;
      font-family: Inter, Helvetica, Arial, sans-serif;
      font-weight: 600;
      box-shadow: 0 0 40px rgba(255,20,147,0.2);
    }
    .pdf-progress .spinner {
      display: inline-block;
      width: 24px;
      height: 24px;
      border: 3px solid rgba(57,255,20,0.2);
      border-top-color: #39FF14;
      border-radius: 50%;
      animation: pdfspin 0.8s linear infinite;
      margin-bottom: 12px;
    }
    @keyframes pdfspin { to { transform: rotate(360deg); } }
    .pdf-progress .pbar {
      width: 100%;
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      margin-top: 12px;
      overflow: hidden;
    }
    .pdf-progress .pbar-fill {
      height: 100%;
      background: linear-gradient(90deg, #39FF14, #FF1493);
      border-radius: 2px;
      transition: width 0.3s;
    }
    .keyboard-hint {
      position: fixed;
      top: 22px;
      right: 22px;
      z-index: 100;
      color: rgba(255, 255, 255, 0.42);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      pointer-events: none;
    }
    @media (max-width: 768px) {
      .keyboard-hint { display: none; }
      .fullscreen-btn {
        top: max(14px, env(safe-area-inset-top));
        left: 14px;
        padding: 7px 12px;
        font-size: 11px;
      }
      .pdf-btn {
        top: max(14px, env(safe-area-inset-top));
        right: 14px;
        padding: 7px 12px;
        font-size: 11px;
      }
    }
  </style>
</head>
<body>
  <div class="progress-bar" id="progressBar"></div>
  <button class="fullscreen-btn" type="button" id="fsBtn">FULLSCREEN</button>
  <button class="pdf-btn" id="pdfBtn" type="button">📄 PDF</button>
  <div class="keyboard-hint">ARROWS TO NAVIGATE  ·  TAP LEFT/RIGHT</div>

  <div class="stage" id="stage">
    <div class="presentation-container" id="container"></div>
  </div>

  <script>
    const slides = [
      'pages/cover.html',
      'pages/about.html',
      'pages/founders.html',
      'pages/problems.html',
      'pages/solutions.html',
      'pages/product.html',
      'pages/materials.html',
      'pages/consumer.html',
      'pages/marketing.html',
      'pages/usp.html',
      'pages/creator.html',
      'pages/sustainable.html',
      'pages/investment.html',
      'pages/growth.html',
      'pages/logo.html',
      'pages/thankyou.html'
    ];

    const SLIDE_W = 1920;
    const SLIDE_H = 1080;

    let currentSlide = 0;
    let activeSrc = '';

    const container = document.getElementById('container');
    const stage = document.getElementById('stage');
    const progressBar = document.getElementById('progressBar');

    const slideFrame = document.createElement('iframe');
    slideFrame.className = 'slide-frame';
    slideFrame.setAttribute('scrolling', 'no');
    slideFrame.style.width = SLIDE_W + 'px';
    slideFrame.style.height = SLIDE_H + 'px';
    container.appendChild(slideFrame);

    function scaleToFit() {
      const scaleX = window.innerWidth / SLIDE_W;
      const scaleY = window.innerHeight / SLIDE_H;
      const scale = Math.min(scaleX, scaleY);
      container.style.transform = 'scale(' + scale + ')';
    }

    function showSlide(index) {
      if (index < 0) index = 0;
      if (index >= slides.length) index = slides.length - 1;
      currentSlide = index;

      const nextSrc = slides[index];
      slideFrame.classList.remove('active');
      if (activeSrc !== nextSrc) {
        activeSrc = nextSrc;
        slideFrame.onload = () => {
          if (activeSrc === nextSrc) {
            slideFrame.classList.add('active');
          }
        };
        slideFrame.src = nextSrc;
      } else {
        slideFrame.classList.add('active');
      }

      progressBar.style.width = ((index + 1) / slides.length * 100) + '%';
    }

    function nextSlide() {
      if (currentSlide < slides.length - 1) showSlide(currentSlide + 1);
    }

    function prevSlide() {
      if (currentSlide > 0) showSlide(currentSlide - 1);
    }

    function isIOS() {
      return /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
    }
    function isStandalone() {
      return window.navigator.standalone === true || window.matchMedia('(display-mode: standalone)').matches;
    }
    function isFullscreen() {
      return !!(document.fullscreenElement || document.webkitFullscreenElement || document.webkitCurrentFullScreenElement);
    }
    function requestFullscreenEl(el) {
      if (el.requestFullscreen) return el.requestFullscreen();
      if (el.webkitRequestFullscreen) return el.webkitRequestFullscreen();
      if (el.webkitEnterFullscreen) return el.webkitEnterFullscreen();
      return Promise.reject(new Error('fullscreen not supported'));
    }
    function exitFullscreen() {
      if (document.exitFullscreen) return document.exitFullscreen();
      if (document.webkitExitFullscreen) return document.webkitExitFullscreen();
      if (document.webkitCancelFullScreen) return document.webkitCancelFullScreen();
      return Promise.reject(new Error('exit fullscreen not supported'));
    }
    function toggleFullscreen() {
      if (isFullscreen()) {
        exitFullscreen().catch(() => {});
        return;
      }
      requestFullscreenEl(document.documentElement).then(() => {
        setTimeout(scaleToFit, 100);
      }).catch(() => {
        try {
          document.body.style.overflow = '';
          document.documentElement.style.overflow = '';
          window.scrollTo(0, 1);
          setTimeout(() => {
            document.body.style.overflow = 'hidden';
            document.documentElement.style.overflow = 'hidden';
            scaleToFit();
          }, 300);
        } catch(e) {}
        showToast(isIOS() && !isStandalone()
          ? '提示：在Safari中点击底部分享按钮 → "添加到主屏幕"，可获得无浏览器栏的真正全屏体验'
          : '已尝试全屏显示');
      });
    }

    function showToast(msg) {
      let t = document.getElementById('fsToast');
      if (!t) {
        t = document.createElement('div');
        t.id = 'fsToast';
        t.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.85);color:#39FF14;padding:12px 20px;border-radius:12px;font-size:13px;z-index:9999;max-width:85%;text-align:center;line-height:1.5;border:1px solid rgba(57,255,20,0.4);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);opacity:0;transition:opacity 0.3s;pointer-events:none;font-family:Inter,Helvetica,Arial,sans-serif;font-weight:600;';
        document.body.appendChild(t);
      }
      t.textContent = msg;
      t.style.opacity = '1';
      clearTimeout(t._timer);
      t._timer = setTimeout(() => { t.style.opacity = '0'; }, 3500);
    }

    // Fullscreen button
    document.getElementById('fsBtn').addEventListener('click', (e) => {
      e.stopPropagation();
      toggleFullscreen();
    });

    // ============================================
    // PDF DOWNLOAD
    // ============================================
    async function loadScript(src) {
      return new Promise((resolve, reject) => {
        if (document.querySelector(`script[data-src="${src}"]`)) { resolve(); return; }
        const s = document.createElement('script');
        s.src = src;
        s.setAttribute('data-src', src);
        s.onload = resolve;
        s.onerror = reject;
        document.head.appendChild(s);
      });
    }
    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
    function waitForFrameLoad(frame, timeoutMs = 20000) {
      return new Promise((resolve) => {
        let done = false;
        const to = setTimeout(() => { if (!done) { done = true; resolve(); } }, timeoutMs);
        const handler = () => { clearTimeout(to); if (!done) { done = true; resolve(); } };
        frame.onload = handler;
        try { frame.addEventListener('load', handler, { once: true }); } catch(e) {}
      });
    }
    function waitForImages(doc, timeoutMs = 10000) {
      return new Promise((resolve) => {
        const start = Date.now();
        function check() {
          const imgs = doc.querySelectorAll('img');
          let allLoaded = true;
          imgs.forEach(img => { if (!img.complete || img.naturalWidth === 0) allLoaded = false; });
          if (allLoaded && Date.now() - start < 500) {
            setTimeout(resolve, 200);
            return;
          }
          if (allLoaded || Date.now() - start > timeoutMs) resolve();
          else setTimeout(check, 200);
        }
        check();
      });
    }
    function injectAnimationFreeze(win) {
      const doc = win.document;
      let style = doc.getElementById('__pdfFreeze__');
      if (style) return;
      style = doc.createElement('style');
      style.id = '__pdfFreeze__';
      style.textContent = `
        *, *::before, *::after {
          animation-duration: 0s !important;
          animation-delay: 0s !important;
          animation-iteration-count: 1 !important;
          animation-fill-mode: forwards !important;
          animation-play-state: paused !important;
          transition-duration: 0s !important;
          transition-delay: 0s !important;
        }
        html, body { overflow: hidden !important; width: 1920px !important; height: 1080px !important; margin: 0 !important; padding: 0 !important; }
      `;
      doc.head.appendChild(style);
      try {
        doc.querySelectorAll('*').forEach(el => {
          try { if (el.getAnimations) el.getAnimations().forEach(a => { try { a.finish(); } catch(e) {} }); } catch(e) {}
        });
      } catch(e) {}
    }
    async function ensureHtml2CanvasInFrame(frame) {
      const win = frame.contentWindow;
      if (win.html2canvas) return win.html2canvas;
      if (!window.html2canvas) {
        await loadScript('https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js');
      }
      const s = win.document.createElement('script');
      s.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
      win.document.head.appendChild(s);
      await new Promise((res) => { s.onload = res; setTimeout(res, 8000); });
      return win.html2canvas;
    }
    function showPdfProgress(text, pct) {
      let el = document.getElementById('pdfProgress');
      if (!el) {
        el = document.createElement('div');
        el.id = 'pdfProgress';
        el.className = 'pdf-progress';
        el.innerHTML = '<div class="spinner"></div><div class="pdf-text"></div><div class="pbar"><div class="pbar-fill"></div></div>';
        document.body.appendChild(el);
      }
      el.querySelector('.pdf-text').textContent = text;
      el.querySelector('.pbar-fill').style.width = (pct != null ? pct : 0) + '%';
      return el;
    }
    function hidePdfProgress() {
      const el = document.getElementById('pdfProgress'); if (el) el.remove();
      const c = document.getElementById('pdfCurtain'); if (c) c.remove();
    }
    function showCurtain() {
      let c = document.getElementById('pdfCurtain');
      if (!c) {
        c = document.createElement('div');
        c.id = 'pdfCurtain';
        c.style.cssText = 'position:fixed;top:0;left:0;width:100vw;height:100vh;background:#000;z-index:9997;';
        document.body.appendChild(c);
      }
    }

    async function generatePDF() {
      const btn = document.getElementById('pdfBtn');
      btn.disabled = true;
      btn.textContent = '⏳ 生成中...';
      const savedSlide = currentSlide;
      try {
        showPdfProgress('正在准备 PDF 渲染引擎...', 0);
        showCurtain();
        await sleep(100);

        await loadScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js');
        await loadScript('https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js');

        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF({ orientation: 'landscape', unit: 'px', format: [1920, 1080], hotfixes: ['px_scaling'], compress: true });

        // ON-SCREEN iframe at top-left (behind curtain), browser paints it
        const frame = document.createElement('iframe');
        frame.style.cssText = 'position:fixed;left:0;top:0;width:1920px;height:1080px;border:0;margin:0;padding:0;z-index:9996;';
        frame.setAttribute('scrolling', 'no');
        document.body.appendChild(frame);

        for (let i = 0; i < slides.length; i++) {
          showPdfProgress(`正在渲染第 ${i+1} / ${slides.length} 页...`, Math.round((i / slides.length) * 100));
          frame.src = slides[i];
          await waitForFrameLoad(frame, 20000);
          await sleep(2200);
          await waitForImages(frame.contentDocument, 8000);
          injectAnimationFreeze(frame.contentWindow);
          await sleep(400);

          let h2c;
          try { h2c = await ensureHtml2CanvasInFrame(frame); } catch(e) { h2c = window.html2canvas; }
          if (!h2c) throw new Error('html2canvas 加载失败');

          const canvas = await h2c(frame.contentDocument.documentElement, {
            width: 1920, height: 1080, windowWidth: 1920, windowHeight: 1080,
            scale: 1, useCORS: true, allowTaint: true,
            backgroundColor: '#000000', logging: false, removeContainer: false,
            foreignObjectRendering: false, imageTimeout: 15000
          });
          const imgData = canvas.toDataURL('image/jpeg', 0.92);
          if (i > 0) pdf.addPage([1920, 1080], 'landscape');
          pdf.addImage(imgData, 'JPEG', 0, 0, 1920, 1080);
        }
        document.body.removeChild(frame);
        showPdfProgress('正在保存 PDF...', 100);
        await sleep(200);
        pdf.save('SOLO_Back_To_The_Future_Sneakers_V2.pdf');
        hidePdfProgress();
        showToast('PDF 下载已开始！');
      } catch(err) {
        console.error('PDF error:', err);
        hidePdfProgress();
        showToast('PDF 生成失败：' + err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = '📄 PDF';
        if (savedSlide !== currentSlide) showSlide(savedSlide);
      }
    }
    document.getElementById('pdfBtn').addEventListener('click', (e) => {
      e.stopPropagation();
      generatePDF();
    });

    window.addEventListener('resize', scaleToFit);
    window.addEventListener('orientationchange', scaleToFit);

    document.addEventListener('keydown', (event) => {
      if (event.key === 'ArrowRight' || event.key === ' ' || event.key === 'Enter') {
        event.preventDefault();
        nextSlide();
      } else if (event.key === 'ArrowLeft' || event.key === 'Backspace') {
        event.preventDefault();
        prevSlide();
      } else if (event.key === 'Home') {
        showSlide(0);
      } else if (event.key === 'End') {
        showSlide(slides.length - 1);
      } else if (event.key === 'f' || event.key === 'F') {
        toggleFullscreen();
      }
    });

    // Click/tap to advance: right half = next, left half = prev
    let touchStartX = 0;
    let touchStartY = 0;
    let touchMoved = false;
    const SWIPE_THRESHOLD = 50;

    stage.addEventListener('click', (event) => {
      if (touchMoved) { touchMoved = false; return; }
      if (event.clientX > window.innerWidth / 2) {
        nextSlide();
      } else {
        prevSlide();
      }
    });

    // Touch swipe support for mobile
    stage.addEventListener('touchstart', (e) => {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
      touchMoved = false;
    }, { passive: true });

    stage.addEventListener('touchmove', (e) => {
      const dx = Math.abs(e.touches[0].clientX - touchStartX);
      const dy = Math.abs(e.touches[0].clientY - touchStartY);
      if (dx > 10 || dy > 10) touchMoved = true;
    }, { passive: true });

    stage.addEventListener('touchend', (e) => {
      if (!touchMoved) return;
      const dx = e.changedTouches[0].clientX - touchStartX;
      const dy = Math.abs(e.changedTouches[0].clientY - touchStartY);
      if (Math.abs(dx) > SWIPE_THRESHOLD && Math.abs(dx) > dy) {
        if (dx < 0) {
          nextSlide();
        } else {
          prevSlide();
        }
      }
      touchMoved = false;
    }, { passive: true });

    scaleToFit();
    showSlide(0);
  </script>
</body>
</html>
